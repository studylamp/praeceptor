{% extends "base.html" %}
{% from "_macros.html" import brand %}
{% block title %}Sign in — Praeceptor{% endblock %}
{% block content %}
<div class="login-brand">{{ brand(klass='brand--lg') }}</div>
<h1>Who's learning today?</h1>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<form method="post" action="/login" class="login">
  <div class="tiles">
    {% for s in students %}
    <label class="tile">
      <input type="radio" name="student_id" value="{{ s.id }}" required>
      <span>{{ s.name }}</span>
    </label>
    {% endfor %}
  </div>
  <label class="pin">PIN
    <input type="password" name="pin" inputmode="numeric" autocomplete="off" required>
  </label>
  <button type="submit">Log in</button>
</form>
{% endblock %}
