{# "Load earlier messages" control for the admin transcript. The href is the no-JS
   fallback (?full=1 renders the whole thread server-side); app.js intercepts the click
   and fetches `data-history` to prepend just the previous page. #}
<a class="load-earlier" href="/admin/conversations/{{ conversation_id }}?full=1"
   data-history="/admin/conversations/{{ conversation_id }}/history?before={{ oldest_id }}">Load earlier messages</a>
